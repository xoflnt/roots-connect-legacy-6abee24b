<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#123026" />
  <title>غير متصل — الخنيني</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: #f6f4f0;
      color: #1a3a2a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111f17; color: #e8dece; }
      .card { background: #1a2d22; border-color: #2a3d32; }
      .retry-btn { background: #c9a84c; color: #111f17; }
      .retry-btn:active { background: #b8973d; }
    }
    .container { text-align: center; max-width: 420px; width: 100%; }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 1.5rem;
      border-radius: 50%; background: rgba(18,48,38,0.1);
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; color: #123026; }
    @media (prefers-color-scheme: dark) { .icon { background: rgba(201,168,76,0.15); } .icon svg { color: #c9a84c; } }
    h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.75rem; }
    p { font-size: 1rem; color: #5a7a6a; line-height: 1.8; margin-bottom: 1.5rem; }
    @media (prefers-color-scheme: dark) { p { color: #8a9a8a; } }
    .retry-btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.5rem; padding: 0.875rem 2rem;
      background: #123026; color: #f6f4f0; border: none;
      border-radius: 0.75rem; font-family: inherit;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      min-height: 48px; min-width: 200px;
      transition: opacity 0.2s;
    }
    .retry-btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072M15.536 8.464a5 5 0 010 7.072M12 12h.01" />
      </svg>
    </div>
    <h1>غير متصل بالإنترنت</h1>
    <p>يبدو أنك غير متصل بالإنترنت حالياً. تحقق من اتصالك وحاول مرة أخرى.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      إعادة المحاولة
    </button>
  </div>
</body>
</html>
